<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>자산관리</title>

  <!-- PWA (안드로이드 Chrome 전용) -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#3A4A3F" />
  <link rel="icon" href="./icon-192.png" />

  <!-- 폰트: 본문 Pretendard, 숫자 JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />

  <style>
    :root {
      --paper: #FBF7EF;
      --paper-2: #F4EEE1;
      --card: #FFFFFF;
      --ink: #3A4A3F;
      --ink-soft: #5B6B60;
      --muted: #8A9089;
      --line: #E4DDCD;
      --gold: #C19A4C;
      --gold-soft: #E7D6AD;
      --accent-soft: #FBF6EA;  /* 선택 항목 배경 */
      --btn-bg: #3A4A3F;    /* 강조 버튼 배경(두 테마 모두 어두운 초록) */
      --btn-fg: #E7D6AD;    /* 강조 버튼 글자 */
      --asset: #2E7D6B;     /* 청록/올리브 자산 */
      --asset-2: #6FA292;
      --loan: #B05A4F;      /* 절제된 적색 부채 */
      --up: #2E7D5B;        /* 증가 녹색 */
      --down: #C0564A;      /* 감소 적색 */
      --radius: 16px;
      --shadow: 0 1px 2px rgba(58,74,63,.06), 0 6px 18px rgba(58,74,63,.06);
    }

    html[data-theme="dark"] {
      --paper: #1E2622;
      --paper-2: #283129;
      --card: #232C27;
      --ink: #E8E2D4;
      --ink-soft: #B7C0B6;
      --muted: #899389;
      --line: #36413A;
      --gold: #D6B36A;
      --gold-soft: #E7D6AD;
      --accent-soft: #33402F;
      --btn-bg: #44544A;
      --btn-fg: #EAD9B0;
      --asset: #5BA993;
      --asset-2: #6FA292;
      --loan: #D98A7D;
      --up: #6FCF97;
      --down: #E08576;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 18px rgba(0,0,0,.28);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; max-width: 100%; }
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.5;
      font-size: 15px;
      padding-bottom: env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
    }
    .mono, .num {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-variant-numeric: tabular-nums;
    }
    button { font-family: inherit; cursor: pointer; }
    h1, h2, h3 { margin: 0; font-weight: 700; }

    /* 레이아웃 */
    .app { max-width: 1100px; margin: 0 auto; padding: 0 16px 96px; }
    header.topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(251,247,239,.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      margin: 0 -16px 16px; padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .topbar .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 18px; letter-spacing: -.02em; }
    .brand .dot { width: 24px; height: 24px; border-radius: 7px; background: var(--btn-bg); color: var(--gold); display: grid; place-items: center; font-weight: 800; font-size: 14px; }
    .topbar .spacer { flex: 1; }

    .icon-btn {
      border: 1px solid var(--line); background: var(--card); color: var(--ink);
      border-radius: 10px; padding: 7px 11px; font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .icon-btn:hover { border-color: var(--gold); }
    #installBtn { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }
    .hidden { display: none !important; }

    .grid { display: grid; gap: 14px; }

    /* 카드 */
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px; }
    .card h2 { font-size: 14px; color: var(--ink-soft); font-weight: 700; letter-spacing: -.01em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    /* 대시보드 */
    .dash { display: grid; grid-template-columns: 1.1fr 1fr; gap: 14px; }
    .hero { background: linear-gradient(155deg, #3F5046, #33433A); color: #F4EEE1; border: none; }
    .hero .label { font-size: 13px; color: #BFC9C0; letter-spacing: .02em; }
    .hero .net { font-size: 38px; font-weight: 800; letter-spacing: -.03em; margin: 4px 0 2px; }
    .hero .delta { font-size: 14px; font-weight: 600; }
    .hero .split { display: flex; gap: 22px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,.14); }
    .hero .split .k { font-size: 12px; color: #BFC9C0; }
    .hero .split .v { font-size: 19px; font-weight: 700; letter-spacing: -.02em; }
    .hero .interest { margin-top: 14px; font-size: 13px; color: #E7D6AD; }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .hero .up { color: #9FE0BE; }
    .hero .down { color: #F0B4AC; }

    .chartbox { position: relative; height: 200px; }
    .chartbox.line { height: 240px; }

    /* 목록 */
    .list-head { display: flex; align-items: center; gap: 8px; margin: 22px 0 10px; }
    .list-head h2 { font-size: 17px; }
    .list-head .spacer { flex: 1; }
    .btn-add { background: var(--btn-bg); color: var(--btn-fg); border: 1px solid var(--btn-bg); border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 700; }
    .btn-add.loan { background: var(--card); color: var(--loan); border-color: var(--loan); }

    .group-title { font-size: 13px; font-weight: 700; color: var(--ink-soft); margin: 16px 4px 8px; display: flex; align-items: center; gap: 7px; }
    .pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .pill.asset { background: #E5F0EC; color: var(--asset); }
    .pill.loan { background: #F6E6E3; color: var(--loan); }

    .row {
      display: grid; grid-template-columns: 1fr auto; gap: 4px 12px;
      align-items: center; padding: 13px 14px; border: 1px solid var(--line);
      border-radius: 12px; background: var(--card); margin-bottom: 8px; cursor: pointer;
      transition: border-color .12s;
    }
    .row:hover { border-color: var(--gold); }
    .row .name { font-weight: 700; letter-spacing: -.01em; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row .sub { font-size: 12px; color: var(--muted); grid-column: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .row .amount { font-size: 17px; font-weight: 700; text-align: right; letter-spacing: -.02em; }
    .row .amount.loan { color: var(--loan); }
    .row .chg { font-size: 12px; text-align: right; grid-column: 2; }
    .row .actions { grid-column: 1 / -1; display: flex; gap: 6px; margin-top: 6px; }
    .mini-btn { border: 1px solid var(--line); background: var(--paper-2); border-radius: 8px; padding: 5px 9px; font-size: 12px; font-weight: 600; color: var(--ink-soft); }
    .mini-btn:hover { border-color: var(--gold); color: var(--ink); }
    .mini-btn.danger:hover { border-color: var(--down); color: var(--down); }

    .empty { text-align: center; color: var(--muted); padding: 28px 10px; font-size: 14px; }

    /* 모달 / 상세 패널 */
    .overlay { position: fixed; inset: 0; background: rgba(40,50,44,.45); z-index: 50; display: none; }
    .overlay.open { display: block; }
    .sheet {
      position: fixed; z-index: 60; background: var(--paper); right: 0; top: 0; bottom: 0;
      width: min(560px, 100%); box-shadow: -10px 0 40px rgba(0,0,0,.18);
      transform: translateX(100%); transition: transform .22s ease; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .sheet.open { transform: translateX(0); }
    .sheet header { position: sticky; top: 0; background: var(--paper); border-bottom: 1px solid var(--line); padding: 14px 16px; display: flex; align-items: center; gap: 10px; z-index: 2; }
    .sheet header h2 { font-size: 17px; }
    .sheet header .spacer { flex: 1; }
    .sheet .body { padding: 16px; }
    .close-x { border: none; background: var(--paper-2); width: 32px; height: 32px; border-radius: 9px; font-size: 18px; color: var(--ink-soft); }

    /* 표 (시계열) */
    .ts { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .ts th { font-size: 11px; color: var(--muted); font-weight: 700; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); }
    .ts td { padding: 4px 6px; border-bottom: 1px solid var(--line); }
    .ts input { width: 100%; border: 1px solid transparent; background: transparent; padding: 7px 8px; border-radius: 8px; font: inherit; color: var(--ink); }
    .ts input:hover { border-color: var(--line); }
    .ts input:focus { outline: none; border-color: var(--gold); background: var(--card); }
    .ts input.num { text-align: right; }
    .ts .del { border: none; background: none; color: var(--muted); font-size: 16px; padding: 4px 6px; border-radius: 6px; }
    .ts .del:hover { color: var(--down); background: #F6E6E3; }
    .ts tr.addrow { background: var(--paper-2); }
    .ts tr.addrow input { border-color: var(--line); background: var(--card); }
    .colw-date { width: 130px; } .colw-act { width: 34px; }

    /* 필드 */
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 12px; color: var(--ink-soft); font-weight: 600; margin-bottom: 5px; }
    .field input, .field select {
      width: 100%; border: 1px solid var(--line); background: var(--card); border-radius: 10px;
      padding: 10px 12px; font: inherit; color: var(--ink);
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--gold); }
    .field.num input { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }
    .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .section-label { font-size: 12px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: .06em; margin: 22px 0 10px; }

    /* 이자 요약 */
    .ical { background: var(--paper-2); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
    .ical .line { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; font-size: 14px; }
    .ical .line .k { color: var(--ink-soft); }
    .ical .line .v { font-weight: 700; letter-spacing: -.02em; }
    .ical .line.total { border-top: 1px dashed var(--line); margin-top: 6px; padding-top: 10px; }
    .ical .warn { color: var(--down); font-size: 12.5px; margin-top: 8px; font-weight: 600; }

    .btn-primary { width: 100%; background: var(--btn-bg); color: var(--btn-fg); border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 700; margin-top: 8px; }
    .btn-ghost { width: 100%; background: transparent; color: var(--down); border: 1px solid var(--line); border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; margin-top: 10px; }
    .btn-ghost:hover { border-color: var(--down); }

    /* 토스트 */
    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
      background: var(--btn-bg); color: #F4EEE1; padding: 12px 18px; border-radius: 12px;
      font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.25);
      z-index: 100; opacity: 0; pointer-events: none; transition: all .25s; display: flex; align-items: center; gap: 12px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .toast button { background: var(--gold); color: #2A332C; border: none; border-radius: 8px; padding: 6px 12px; font-weight: 700; font-size: 13px; }

    .foot { text-align: center; color: var(--muted); font-size: 12px; margin-top: 28px; }

    /* 커스텀 그래프 */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .chip { border: 1px solid var(--line); background: var(--paper-2); border-radius: 999px; padding: 6px 13px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
    .chip:hover { border-color: var(--gold); color: var(--ink); }
    .chip.clear { color: var(--down); }
    .modes { display: flex; gap: 8px; margin-bottom: 12px; }
    .seg { border: 1px solid var(--line); background: var(--card); border-radius: 9px; padding: 7px 16px; font-size: 13px; font-weight: 700; color: var(--ink-soft); }
    .seg.on { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }
    .checklist { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; margin-bottom: 14px; padding: 2px; }
    .checkitem { display: flex; align-items: center; gap: 7px; font-size: 12.5px; padding: 6px 9px; border: 1px solid var(--line); border-radius: 8px; background: var(--card); cursor: pointer; user-select: none; }
    .checkitem:hover { border-color: var(--gold); }
    .checkitem.on { border-color: var(--gold); background: var(--accent-soft); font-weight: 600; }
    .checkitem input { accent-color: var(--ink); width: 14px; height: 14px; flex-shrink: 0; }
    .checkitem .tag { width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0; }
    .checkitem span.nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .check-group { grid-column: 1 / -1; font-size: 11px; font-weight: 700; color: var(--muted); margin: 6px 2px 0; letter-spacing: .02em; }
    .custom-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 10px; }
    .charthint { font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px; }

    /* 목표 게이지 (hero) */
    .goal { margin-top: 14px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,.14); }
    .goal .grow { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: #BFC9C0; margin-bottom: 6px; }
    .goal .grow b { color: #E7D6AD; font-weight: 700; }
    .goal .bar { height: 8px; border-radius: 999px; background: rgba(255,255,255,.16); overflow: hidden; }
    .goal .bar > i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #C19A4C, #E7D6AD); transition: width .4s; }
    .goal .setgoal { background: rgba(255,255,255,.12); color: #E7D6AD; border: 1px dashed rgba(231,214,173,.5); border-radius: 9px; padding: 7px 12px; font-size: 12.5px; font-weight: 600; width: 100%; }

    /* 현금흐름 카드 */
    .cf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .cf .box { background: var(--paper-2); border: 1px solid var(--line); border-radius: 12px; padding: 12px; }
    .cf .box .k { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 4px; }
    .cf .box .v { font-size: 16px; font-weight: 700; letter-spacing: -.02em; }
    .cf .box .v.down { color: var(--loan); }
    .cf-next { margin-top: 12px; font-size: 13px; color: var(--ink-soft); display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .cf-next b { color: var(--ink); font-weight: 700; }

    /* 기간 필터 / 세그 미니 */
    .period { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
    .period .lab { font-size: 12px; color: var(--muted); margin-right: 2px; }
    .seg-sm { border: 1px solid var(--line); background: var(--card); border-radius: 8px; padding: 4px 11px; font-size: 12px; font-weight: 600; color: var(--ink-soft); }
    .seg-sm.on { background: var(--btn-bg); color: var(--btn-fg); border-color: var(--btn-bg); }

    /* 목록 검색·정렬 바 */
    .listbar { display: flex; gap: 8px; margin: 4px 0 10px; width: 100%; }
    .listbar input { flex: 1 1 auto; min-width: 0; border: 1px solid var(--line); background: var(--card); color: var(--ink); border-radius: 10px; padding: 9px 12px; font: inherit; }
    .listbar input:focus { outline: none; border-color: var(--gold); }
    .listbar select { flex: 0 0 auto; max-width: 42%; border: 1px solid var(--line); background: var(--card); color: var(--ink); border-radius: 10px; padding: 9px 10px; font: inherit; }
    .group-title { cursor: pointer; }
    .group-title .chev { margin-left: auto; color: var(--muted); transition: transform .15s; font-size: 11px; }
    .group-title.collapsed .chev { transform: rotate(-90deg); }

    /* 데이터 관리 카드 */
    .datacard { margin-top: 24px; }
    .backup-badge { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .backup-badge .stale { color: var(--down); }
    .backup-badge .ok { color: var(--up); }
    .data-actions { display: flex; flex-wrap: wrap; gap: 8px; }

    /* 손익 배지 */
    .pl { font-size: 12px; font-weight: 600; }
    .row .pl { grid-column: 1; }

    @media (max-width: 720px) {
      .dash { grid-template-columns: 1fr; }
      .hero .net { font-size: 32px; }
      .app { padding: 0 12px 96px; }
      header.topbar { margin: 0 -12px 14px; padding: 11px 12px; }
      .frow { grid-template-columns: 1fr; }
      .topbar .label-txt { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><span class="dot">₩</span><span>자산관리</span></div>
      <div class="spacer"></div>
      <button id="installBtn" class="icon-btn hidden">⬇ <span class="label-txt">앱 설치</span></button>
      <button id="themeBtn" class="icon-btn" title="테마 전환" aria-label="테마 전환">🌙</button>
      <button id="exportBtn" class="icon-btn">⤓ <span class="label-txt">내보내기</span></button>
      <button id="importBtn" class="icon-btn">⤒ <span class="label-txt">가져오기</span></button>
      <button id="resetBtn" class="icon-btn">⟲ <span class="label-txt">초기화</span></button>
      <input id="importFile" type="file" accept="application/json,.json" class="hidden" />
    </header>

    <!-- 대시보드 -->
    <section class="dash">
      <div class="card hero">
        <div class="label">순자산</div>
        <div class="net num" id="netWorth">0원</div>
        <div class="delta num" id="netDelta">—</div>
        <div class="split">
          <div><div class="k">총자산</div><div class="v num" id="totalAssets">0원</div></div>
          <div><div class="k">총부채</div><div class="v num" id="totalLoans">0원</div></div>
        </div>
        <div class="interest" id="monthInterest">이번 달 총 이자 — </div>
        <div class="goal" id="goalRow"></div>
      </div>
      <div class="card">
        <h2>자산 구성</h2>
        <div class="chartbox"><canvas id="donut"></canvas></div>
      </div>
    </section>

    <div class="card" id="cashflowCard" style="margin-top:14px">
      <h2>이번 달 현금흐름</h2>
      <div id="cashflowBody"></div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>순자산 추이</h2>
      <div class="period" id="periodFilter">
        <span class="lab">기간</span>
        <button class="seg-sm" data-p="3m">3개월</button>
        <button class="seg-sm" data-p="6m">6개월</button>
        <button class="seg-sm" data-p="12m">1년</button>
        <button class="seg-sm" data-p="all">전체</button>
      </div>
      <div class="chartbox line"><canvas id="trend"></canvas></div>
      <div class="charthint hidden" id="trendHint"></div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>커스텀 그래프 <span style="font-weight:500;color:var(--muted);font-size:12px">— 원하는 항목만 골라서</span></h2>
      <div class="chips" id="customPresets"></div>
      <div class="modes">
        <button class="seg" id="modeIndividual" data-mode="individual">개별 비교</button>
        <button class="seg" id="modeSum" data-mode="sum">합산</button>
      </div>
      <div class="checklist" id="customChecks"></div>
      <div class="chartbox line"><canvas id="customChart"></canvas></div>
      <div class="charthint hidden" id="customHint"></div>
    </div>

    <!-- 목록 -->
    <div class="list-head">
      <h2>자산 · 대출</h2>
      <div class="spacer"></div>
      <button class="btn-add" id="addAssetBtn">+ 자산 추가</button>
      <button class="btn-add loan" id="addLoanBtn">+ 대출 추가</button>
    </div>
    <div class="listbar">
      <input id="searchInput" type="search" placeholder="이름으로 검색…" aria-label="항목 검색" />
      <select id="sortSelect" aria-label="정렬">

    <div class="card datacard">
      <h2>데이터 관리</h2>

      <div class="data-actions">
        <button class="icon-btn" id="csvBtn">⤓ CSV 내보내기</button>
        <button class="icon-btn" id="exportBtn2">⤓ JSON 백업</button>
        <button class="icon-btn" id="importBtn2">⤒ 가져오기</button>

    </div>

  <!-- 상세/편집 시트 -->
  <div class="overlay" id="overlay"></div>
  <aside class="sheet" id="sheet">
    <header>
      <h2 id="sheetTitle">상세</h2>

    <div class="body" id="sheetBody"></div>
  </aside>

  <!-- 토스트 -->
  <div class="toast" id="toast"><span id="toastMsg"></span><button id="toastAction" class="hidden"></button></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
  /* ============================================================
     자산관리 PWA — 순수 Vanilla JS, 상태관리 직접 구현
     ============================================================ */
  'use strict';

  const STORE_KEY = 'asset-app-data';
  const todayISO = () => new Date().toISOString().slice(0, 10);

  /* ---------- 유틸 ---------- */
  function uuid() {
    if (crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
      const r = (Math.random() * 16) | 0;
      return (c === 'x' ? r : (r & 0x3) | 0x8).toString(16);
    });
  }
  const fmtWon = (n) => (Math.round(Number(n) || 0)).toLocaleString('ko-KR') + '원';
  const fmtSigned = (n) => (n > 0 ? '+' : n < 0 ? '−' : '') + Math.abs(Math.round(n)).toLocaleString('ko-KR') + '원';
  const fmtPct = (n) => (n > 0 ? '+' : n < 0 ? '−' : '') + Math.abs(n).toFixed(1) + '%';

  // 한글 작은 단위(천/백) 파서
  function parseSmall(s) {
    if (s == null || s === '') return null;
    let total = 0, rest = s, used = false;
    for (const [u, mul] of [['천', 1e3], ['백', 1e2]]) {
      const idx = rest.indexOf(u);
      if (idx < 0) continue;
      const c = parseFloat(rest.slice(0, idx) || '1');
      total += (isFinite(c) ? c : 1) * mul; used = true;
      rest = rest.slice(idx + 1);
    }
    const t = parseFloat(rest);
    if (isFinite(t)) { total += t; used = true; }
    return used ? total : null;
  }
  // 한글 큰 단위(조/억/만) 파서 — "8억5000만", "3천만", "1조2000억" 등
  function parseKorean(s) {
    const big = [['조', 1e12], ['억', 1e8], ['만', 1e4]];
    let total = 0, rest = s, used = false;
    for (const [u, mul] of big) {
      const idx = rest.indexOf(u);
      if (idx < 0) continue;
      const coef = parseSmall(rest.slice(0, idx));
      total += (coef == null ? 1 : coef) * mul; used = true;
      rest = rest.slice(idx + 1);
    }
    const tail = parseSmall(rest);
    if (tail != null) { total += tail; used = true; }
    return used ? total : null;
  }
  // 금액 파싱: 콤마/공백/원 제거 + 한글 단위 지원, 음수 방지
  function parseAmount(str) {
    if (typeof str === 'number') return Math.max(0, Math.round(str));
    let s = String(str == null ? '' : str).trim().replace(/[,\s원₩]/g, '');
    if (!s) return 0;
    if (/[조억만천백]/.test(s)) {
      const k = parseKorean(s);
      if (k != null && isFinite(k)) return Math.max(0, Math.round(k));
    }
    const n = parseFloat(s);
    if (!isFinite(n) || isNaN(n)) return 0;
    return Math.max(0, Math.round(n));
  }
  // 입력창 자동 천단위 콤마 (한글 단위/소수 입력 중에는 건드리지 않음)
  function attachAmountInput(inp) {
    if (!inp) return;
    inp.addEventListener('input', () => {
      if (/[조억만천백.]/.test(inp.value)) return;
      const digits = inp.value.replace(/[^\d]/g, '');
      inp.value = digits ? Number(digits).toLocaleString('ko-KR') : '';
    });
  }
  // 큰 금액 축약 (억/조 자동) — 차트 축·게이지용
  function fmtShort(n) {
    const v = Number(n) || 0, a = Math.abs(v);
    if (a >= 1e12) return (v / 1e12).toFixed(a >= 1e13 ? 1 : 2) + '조';
    if (a >= 1e8) return (v / 1e8).toFixed(a >= 1e9 ? 0 : 1) + '억';
    if (a >= 1e4) return Math.round(v / 1e4) + '만';
    return String(Math.round(v));
  }
  const cssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  function chartTheme() {
    const dark = document.documentElement.dataset.theme === 'dark';
    return { tick: cssVar('--muted') || '#8A9089', grid: dark ? '#36413A' : '#EFE9DA', card: cssVar('--card') || '#fff' };
  }
  function download(content, filename, type) {
    const blob = new Blob([content], { type });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }
  function validDate(str) { return /^\d{4}-\d{2}-\d{2}$/.test(str) && !isNaN(new Date(str).getTime()); }

  // 최신 기록(날짜 기준)
  function latest(records, key) {
    if (!records || !records.length) return null;
    return records.slice().sort((a, b) => a.date < b.date ? 1 : -1)[0];
  }
  function latestRate(hist) {
    if (!hist || !hist.length) return null;
    return hist.slice().sort((a, b) => a.date < b.date ? 1 : -1)[0];
  }
  // 직전 대비 증감 (최신 - 그 이전)
  function prevDelta(records, field) {
    if (!records || records.length < 2) return null;
    const s = records.slice().sort((a, b) => a.date < b.date ? 1 : -1);
    return (Number(s[0][field]) || 0) - (Number(s[1][field]) || 0);
  }

  // 잔여 개월수 (오늘 ~ 만기), 음수 가드
  function monthsUntil(maturity) {
    if (!validDate(maturity)) return 0;
    const now = new Date(todayISO());
    const m = new Date(maturity);
    let months = (m.getFullYear() - now.getFullYear()) * 12 + (m.getMonth() - now.getMonth());
    if (m.getDate() < now.getDate()) months -= 1;
    return Math.max(0, months);
  }

  const CAT_LABEL = { real_estate: '부동산', financial: '금융자산', cash: '현금성' };
  const CAT_ORDER = ['real_estate', 'financial', 'cash'];
  const CAT_COLOR = { real_estate: '#2E7D6B', financial: '#6FA292', cash: '#C19A4C' };
  const REPAY_LABEL = { bullet: '만기일시상환', equal_payment: '원리금균등', equal_principal: '원금균등' };
  const RATE_LABEL = { fixed: '고정금리', variable: '변동금리' };

  /* ---------- 상태 ---------- */
  let state = { assets: [], loans: [] };

  function save() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    catch (e) { console.error('저장 실패', e); toast('저장 실패: 저장 공간 부족'); }
  }
  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) { state = JSON.parse(raw); state.assets ||= []; state.loans ||= []; return true; }
    } catch (e) { console.error('불러오기 실패', e); }
    return false;
  }

  /* ---------- 설정 키 ---------- */
  const THEME_KEY = 'asset-app-theme';
  const GOAL_KEY = 'asset-app-goal';
  const PERIOD_KEY = 'asset-app-period';
  const BACKUP_KEY = 'asset-app-lastbackup';
  let goalAmount = 0;       // 순자산 목표
  let chartPeriod = 'all';  // 3m | 6m | 12m | all

  /* ---------- 실행취소(1단계) ---------- */
  let undoSnapshot = null;
  function snapshot() { undoSnapshot = JSON.stringify(state); }
  function doUndo() {
    if (!undoSnapshot) return;
    try { state = JSON.parse(undoSnapshot); save(); renderAll(); closeSheet(); toast('실행취소되었습니다'); undoSnapshot = null; }
    catch (e) { toast('실행취소 실패'); }
  }

  /* ---------- 가져오기 데이터 정제(sanitize) ---------- */
  function sanitizeData(data) {
    const recOf = (r, field) => ({
      date: (r && validDate(r.date)) ? r.date : null,
      [field]: parseAmount(r && r[field]),
      note: (r && typeof r.note === 'string') ? r.note : ''
    });
    const assets = (Array.isArray(data.assets) ? data.assets : []).map((a) => ({
      id: (a && a.id) || uuid(),
      name: String((a && a.name) || '이름없음'),
      category: CAT_ORDER.includes(a && a.category) ? a.category : 'financial',
      subType: String((a && a.subType) || ''),
      principal: (a && a.principal != null && a.principal !== '') ? parseAmount(a.principal) : null,
      records: (Array.isArray(a && a.records) ? a.records : []).map((r) => recOf(r, 'amount')).filter((r) => r.date)
    }));
    const loans = (Array.isArray(data.loans) ? data.loans : []).map((l) => ({
      id: (l && l.id) || uuid(),
      name: String((l && l.name) || '이름없음'),
      lender: String((l && l.lender) || ''),
      rateType: ['fixed', 'variable'].includes(l && l.rateType) ? l.rateType : 'fixed',
      repaymentType: ['bullet', 'equal_payment', 'equal_principal'].includes(l && l.repaymentType) ? l.repaymentType : 'equal_payment',
      startDate: (l && validDate(l.startDate)) ? l.startDate : todayISO(),
      maturityDate: (l && validDate(l.maturityDate)) ? l.maturityDate : todayISO(),
      rateHistory: (() => {
        const h = (Array.isArray(l && l.rateHistory) ? l.rateHistory : [])
          .map((x) => ({ date: (x && validDate(x.date)) ? x.date : null, rate: (() => { const v = parseFloat(String(x && x.rate).replace(/[,\s%]/g, '')); return isFinite(v) && v >= 0 ? v : 0; })() }))
          .filter((x) => x.date);
        return h.length ? h : [{ date: (l && validDate(l.startDate)) ? l.startDate : todayISO(), rate: 0 }];
      })(),
      records: (Array.isArray(l && l.records) ? l.records : []).map((r) => recOf(r, 'balance')).filter((r) => r.date)
    }));
    return { assets, loans };
  }

  /* ---------- 테마 ---------- */
  function applyTheme(theme) {
    const dark = theme === 'dark';
    document.documentElement.dataset.theme = dark ? 'dark' : 'light';
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', dark ? '#1E2622' : '#3A4A3F');
    const btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = dark ? '☀️' : '🌙';
    try { localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light'); } catch (e) {}
  }
  function initTheme() {
    let t = null;
    try { t = localStorage.getItem(THEME_KEY); } catch (e) {}
    if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    applyTheme(t);
  }

  /* ---------- 자산 손익 / 대출 현금흐름 ---------- */
  function assetGain(a) {
    if (a.principal == null || !(a.principal > 0)) return null;
    const r = latest(a.records);
    const cur = r ? Number(r.amount) || 0 : 0;
    const gain = cur - a.principal;
    return { principal: a.principal, cur, gain, pct: a.principal ? (gain / a.principal) * 100 : 0 };
  }
  function nextPaymentDate(loan) {
    if (!validDate(loan.startDate)) return null;
    const day = new Date(loan.startDate).getDate();
    const now = new Date(todayISO());
    let d = new Date(now.getFullYear(), now.getMonth(), day);
    if (d < now) d = new Date(now.getFullYear(), now.getMonth() + 1, day);
    if (validDate(loan.maturityDate) && d > new Date(loan.maturityDate)) return null;
    return d.toISOString().slice(0, 10);
  }
  function cutoffFor(period) {
    if (period === 'all') return null;
    const months = period === '3m' ? 3 : period === '6m' ? 6 : 12;
    const d = new Date(todayISO()); d.setMonth(d.getMonth() - months);
    return d.toISOString().slice(0, 10);
  }

  /* ---------- 더미 샘플 데이터 ---------- */
  function seed() {
    state = {
      assets: [
        { id: uuid(), name: '래미안 아파트', category: 'real_estate', subType: '아파트',
          records: [
            { date: '2026-01-01', amount: 820000000, note: '연초 시세' },
            { date: '2026-04-01', amount: 845000000, note: '' },
            { date: '2026-06-01', amount: 860000000, note: '실거래 반영' }
          ] },
        { id: uuid(), name: '삼성전자', category: 'financial', subType: '주식',
          records: [
            { date: '2026-03-01', amount: 18500000, note: '' },
            { date: '2026-06-01', amount: 21200000, note: '' }
          ] },
        { id: uuid(), name: '하나은행 예금', category: 'cash', subType: '예금',
          records: [
            { date: '2026-02-01', amount: 50000000, note: '' },
            { date: '2026-06-01', amount: 50800000, note: '이자 가산' }
          ] }
      ],
      loans: [
        { id: uuid(), name: '주택담보대출', lender: '국민은행',
          rateType: 'variable', repaymentType: 'equal_payment',
          startDate: '2025-01-10', maturityDate: '2055-01-10',
          rateHistory: [ { date: '2025-01-10', rate: 3.85 }, { date: '2026-04-01', rate: 4.10 } ],
          records: [
            { date: '2026-01-01', balance: 408000000, note: '' },
            { date: '2026-06-01', balance: 400000000, note: '' }
          ] }
      ]
    };
    save();
  }

  /* ---------- 집계 ---------- */
  function totalAssets() {
    return state.assets.reduce((s, a) => { const r = latest(a.records); return s + (r ? Number(r.amount) || 0 : 0); }, 0);
  }
  function totalLoans() {
    return state.loans.reduce((s, l) => { const r = latest(l.records); return s + (r ? Number(r.balance) || 0 : 0); }, 0);
  }

  // 시점 t의 순자산 (날짜≤t 최신값 합)
  function valueAtDate(records, field, t) {
    let best = null;
    for (const r of records || []) {
      if (r.date <= t && (!best || r.date > best.date)) best = r;
    }
    return best ? (Number(best[field]) || 0) : 0;
  }
  function netWorthSeries() {
    const dates = new Set();
    state.assets.forEach((a) => (a.records || []).forEach((r) => dates.add(r.date)));
    state.loans.forEach((l) => (l.records || []).forEach((r) => dates.add(r.date)));
    const sorted = [...dates].filter(validDate).sort();
    return sorted.map((t) => {
      const assets = state.assets.reduce((s, a) => s + valueAtDate(a.records, 'amount', t), 0);
      const loans = state.loans.reduce((s, l) => s + valueAtDate(l.records, 'balance', t), 0);
      return { date: t, net: assets - loans };
    });
  }

  /* ---------- 대출 이자 계산 ---------- */
  function loanInterest(loan) {
    const rec = latest(loan.records);
    const P = rec ? Number(rec.balance) || 0 : 0;
    const rateObj = latestRate(loan.rateHistory);
    const annual = rateObj ? Number(rateObj.rate) || 0 : 0;
    const r = annual / 100 / 12;          // 월이율
    const n = monthsUntil(loan.maturityDate); // 잔여 개월
    const expired = validDate(loan.maturityDate) && new Date(loan.maturityDate) < new Date(todayISO());

    const monthInterest = Math.round(P * r);
    let monthlyPayment = 0, principalPart = 0, interestPart = monthInterest, totalInterest = 0;

    if (P <= 0) {
      return { P, annual, n, expired, monthInterest: 0, monthlyPayment: 0, principalPart: 0, interestPart: 0, totalInterest: 0 };
    }

    if (loan.repaymentType === 'bullet') {
      monthlyPayment = monthInterest;           // 이자만 납입
      principalPart = 0; interestPart = monthInterest;
      totalInterest = n > 0 ? monthInterest * n : 0;
    } else if (loan.repaymentType === 'equal_payment') {
      if (n <= 0) {
        monthlyPayment = P + monthInterest; principalPart = P; interestPart = monthInterest; totalInterest = monthInterest;
      } else if (r === 0) {
        monthlyPayment = Math.round(P / n); principalPart = monthlyPayment; interestPart = 0; totalInterest = 0;
      } else {
        const pow = Math.pow(1 + r, n);
        monthlyPayment = Math.round(P * r * pow / (pow - 1));
        interestPart = monthInterest;
        principalPart = monthlyPayment - interestPart;
        totalInterest = Math.round(monthlyPayment * n - P);
      }
    } else if (loan.repaymentType === 'equal_principal') {
      if (n <= 0) {
        principalPart = P; interestPart = monthInterest; monthlyPayment = P + monthInterest; totalInterest = monthInterest;
      } else {
        principalPart = Math.round(P / n);
        interestPart = monthInterest;
        monthlyPayment = principalPart + interestPart;
        totalInterest = Math.round(r * P * (n + 1) / 2);
      }
    }
    // NaN/Infinity 최종 가드
    const guard = (v) => (isFinite(v) ? v : 0);
    return {
      P, annual, n, expired,
      monthInterest: guard(monthInterest),
      monthlyPayment: guard(monthlyPayment),
      principalPart: guard(principalPart),
      interestPart: guard(interestPart),
      totalInterest: guard(totalInterest)
    };
  }
  function monthTotalInterest() {
    return state.loans.reduce((s, l) => s + loanInterest(l).monthInterest, 0);
  }

  /* ============================================================
     렌더링
     ============================================================ */
  let donutChart = null, trendChart = null;

  function renderDashboard() {
    const ta = totalAssets(), tl = totalLoans(), net = ta - tl;
    document.getElementById('totalAssets').textContent = fmtWon(ta);
    document.getElementById('totalLoans').textContent = fmtWon(tl);
    document.getElementById('netWorth').textContent = fmtWon(net);

    // 증감: 순자산 추이의 마지막 - 직전
    const series = netWorthSeries();
    const deltaEl = document.getElementById('netDelta');
    if (series.length >= 2) {
      const d = series[series.length - 1].net - series[series.length - 2].net;
      const base = series[series.length - 2].net;
      const pct = base !== 0 ? (d / Math.abs(base)) * 100 : 0;
      deltaEl.className = 'delta num ' + (d > 0 ? 'up' : d < 0 ? 'down' : '');
      deltaEl.textContent = `${fmtSigned(d)} (${fmtPct(pct)}) · 직전 기록 대비`;
    } else {
      deltaEl.className = 'delta num';
      deltaEl.textContent = '기록이 쌓이면 증감이 표시됩니다';
    }

    const mi = monthTotalInterest();
    document.getElementById('monthInterest').textContent = '이번 달 총 이자 부담 ' + fmtWon(mi);

    renderGoal(net);
    renderCashflow();
    renderDonut();
    const cutoff = cutoffFor(chartPeriod);
    renderTrend(cutoff ? series.filter((s) => s.date >= cutoff) : series);
    // 기간 버튼 활성 표시
    document.querySelectorAll('#periodFilter .seg-sm').forEach((b) => b.classList.toggle('on', b.dataset.p === chartPeriod));
  }

  /* ---------- 목표 게이지 ---------- */
  function renderGoal(net) {
    const el = document.getElementById('goalRow');
    if (!el) return;
    if (!(goalAmount > 0)) {
      el.innerHTML = '<button class="setgoal" id="setGoalBtn">＋ 순자산 목표 설정</button>';
    } else {
      const pct = Math.max(0, Math.min(100, (net / goalAmount) * 100));
      el.innerHTML = `
        <div class="grow"><span>목표까지 <b>${fmtWon(Math.max(0, goalAmount - net))}</b></span><span>달성률 <b>${pct.toFixed(1)}%</b></span></div>
        <div class="bar"><i style="width:${pct}%"></i></div>
        <div class="grow" style="margin-top:6px;margin-bottom:0"><span id="setGoalBtn" style="cursor:pointer;text-decoration:underline">목표 ${fmtShort(goalAmount)} 수정</span><span></span></div>`;
    }
    const btn = document.getElementById('setGoalBtn');
    if (btn) btn.addEventListener('click', () => {
      const input = prompt('순자산 목표 금액 (예: 10억, 1500000000)', goalAmount || '');
      if (input == null) return;
      const v = parseAmount(input);
      goalAmount = v;
      try { localStorage.setItem(GOAL_KEY, String(v)); } catch (e) {}
      renderDashboard();
      toast(v > 0 ? '목표가 설정되었습니다' : '목표를 해제했습니다');
    });
  }

  /* ---------- 현금흐름 카드 ---------- */
  function renderCashflow() {
    const card = document.getElementById('cashflowCard');
    const body = document.getElementById('cashflowBody');
    if (!card || !body) return;
    if (!state.loans.length) { card.classList.add('hidden'); return; }
    card.classList.remove('hidden');
    let pay = 0, prin = 0, intr = 0;
    state.loans.forEach((l) => { const ic = loanInterest(l); pay += ic.monthlyPayment; prin += ic.principalPart; intr += ic.interestPart; });
    const nexts = state.loans.map((l) => ({ name: l.name, d: nextPaymentDate(l) })).filter((x) => x.d).sort((a, b) => a.d < b.d ? -1 : 1);
    const nextHtml = nexts.length
      ? `<div class="cf-next">${nexts.slice(0, 4).map((x) => `<span>${escapeHtml(x.name)} <b>${x.d}</b></span>`).join('')}</div>`
      : '';
    body.innerHTML = `
      <div class="cf">
        <div class="box"><div class="k">총 월 납입</div><div class="v num">${fmtWon(pay)}</div></div>
        <div class="box"><div class="k">└ 원금분</div><div class="v num">${fmtWon(prin)}</div></div>
        <div class="box"><div class="k">└ 이자분</div><div class="v num down">${fmtWon(intr)}</div></div>
      </div>
      ${nextHtml ? '<div style="font-size:11.5px;color:var(--muted);margin-top:12px;margin-bottom:2px">다음 상환 예정일</div>' + nextHtml : ''}`;

  function renderDonut() {
    const totals = { real_estate: 0, financial: 0, cash: 0 };
    state.assets.forEach((a) => { const r = latest(a.records); if (r) totals[a.category] = (totals[a.category] || 0) + (Number(r.amount) || 0); });

    const sum = data.reduce((s, v) => s + v, 0);
    donutChart = new Chart(ctx, {
      type: 'doughnut',

  /* ---------- 커스텀 그래프 ---------- */
  const VIEW_KEY = 'asset-app-view';
  const ASSET_PALETTE = ['#2E7D6B', '#6FA292', '#C19A4C', '#4E8A78', '#A88C4E', '#8FB3A6', '#3F6B5E', '#D2B36A'];
  const LOAN_PALETTE = ['#B05A4F', '#C97A6E', '#9E4438', '#D89A8F'];
  let customSel = new Set();          // 선택된 항목 id
  let customMode = 'individual';      // 'individual' | 'sum'
  let customChart = null;

  function getItemById(id) {
    const a = state.assets.find((x) => x.id === id);
    if (a) return { kind: 'asset', obj: a, field: 'amount' };
    const l = state.loans.find((x) => x.id === id);
    if (l) return { kind: 'loan', obj: l, field: 'balance' };
    return null;
  }
  function saveView() {
    try { localStorage.setItem(VIEW_KEY, JSON.stringify({ sel: [...customSel], mode: customMode })); } catch (e) {}
  }
  function loadView() {
    try {
      const v = JSON.parse(localStorage.getItem(VIEW_KEY));
      if (v) { customSel = new Set(v.sel || []); customMode = v.mode === 'sum' ? 'sum' : 'individual'; return true; }
    } catch (e) {}
    return false;
  }

  const PRESETS = [
    { label: '전체 자산', mode: 'individual', ids: () => state.assets.map((a) => a.id) },
    { label: '부동산', mode: 'individual', ids: () => state.assets.filter((a) => a.category === 'real_estate').map((a) => a.id) },
    { label: '금융자산', mode: 'individual', ids: () => state.assets.filter((a) => a.category === 'financial').map((a) => a.id) },
    { label: '현금성', mode: 'individual', ids: () => state.assets.filter((a) => a.category === 'cash').map((a) => a.id) },
    { label: '부채(대출)', mode: 'individual', ids: () => state.loans.map((l) => l.id) },
    { label: '순자산(전체 합산)', mode: 'sum', ids: () => [...state.assets.map((a) => a.id), ...state.loans.map((l) => l.id)] }
  ];

  function renderCustom() {
    [...customSel].forEach((id) => { if (!getItemById(id)) customSel.delete(id); }); // 삭제된 항목 정리

    // 프리셋 칩
    const pc = document.getElementById('customPresets');
    pc.innerHTML = '';
    PRESETS.forEach((p) => {
      if (!p.ids().length) return;
      const b = document.createElement('button');
      b.className = 'chip'; b.textContent = p.label;
      b.addEventListener('click', () => { customSel = new Set(p.ids()); customMode = p.mode; renderCustom(); });
      pc.appendChild(b);
    });
    const clr = document.createElement('button');
    clr.className = 'chip clear'; clr.textContent = '선택 해제';
    clr.addEventListener('click', () => { customSel.clear(); renderCustom(); });
    pc.appendChild(clr);

    // 모드 토글
    document.getElementById('modeIndividual').classList.toggle('on', customMode === 'individual');
    document.getElementById('modeSum').classList.toggle('on', customMode === 'sum');

    // 체크리스트 (자산: 카테고리별, 그다음 대출)
    const cl = document.getElementById('customChecks');
    cl.innerHTML = '';
    const addItem = (id, name, color) => {
      const on = customSel.has(id);
      const lab = document.createElement('label');
      lab.className = 'checkitem' + (on ? ' on' : '');
      lab.innerHTML = `<input type="checkbox" ${on ? 'checked' : ''}><span class="tag" style="background:${color}"></span><span class="nm">${escapeHtml(name)}</span>`;
      lab.querySelector('input').addEventListener('change', (e) => {
        if (e.target.checked) customSel.add(id); else customSel.delete(id);
        lab.classList.toggle('on', e.target.checked);
        drawCustom(); saveView();
      });
      cl.appendChild(lab);
    };
    let ai = 0, li = 0;
    CAT_ORDER.forEach((cat) => {
      const items = state.assets.filter((a) => a.category === cat);
      if (!items.length) return;
      const g = document.createElement('div'); g.className = 'check-group'; g.textContent = CAT_LABEL[cat];
      cl.appendChild(g);
      items.forEach((a) => addItem(a.id, a.name, ASSET_PALETTE[ai++ % ASSET_PALETTE.length]));

      const g = document.createElement('div'); g.className = 'check-group'; g.textContent = '대출(부채)';

      state.loans.forEach((l) => addItem(l.id, l.name, LOAN_PALETTE[li++ % LOAN_PALETTE.length]));

    saveView();

  function customDates(ids) {
    const s = new Set();
    ids.forEach((id) => { const it = getItemById(id); if (it) (it.obj.records || []).forEach((r) => s.add(r.date)); });
    return [...s].filter(validDate).sort();
  }

  function drawCustom() {
    if (customChart) { customChart.destroy(); customChart = null; }
    const ctx = document.getElementById('customChart');
    const ids = [...customSel].filter((id) => getItemById(id));
    const cutoff = cutoffFor(chartPeriod);
    let dates = customDates(ids);
    if (cutoff) dates = dates.filter((d) => d >= cutoff);
    if (!ids.length || !dates.length) { ctx.getContext('2d').clearRect(0, 0, ctx.width, ctx.height); setHint('customHint', false); return; }
    const single = dates.length < 2;
    setHint('customHint', single);

    let datasets;
    if (customMode === 'sum') {
      const hasA = ids.some((id) => getItemById(id).kind === 'asset');
      const hasL = ids.some((id) => getItemById(id).kind === 'loan');
      let data = dates.map((t) => ids.reduce((sum, id) => {
        const it = getItemById(id);
        const v = valueAtDate(it.obj.records, it.field, t);
        return sum + (it.kind === 'asset' ? v : -v);
      }, 0));
      let label = '합계', color = '#3A4A3F';
      if (hasA && hasL) { label = '순액 (자산 − 부채)'; color = '#3A4A3F'; }
      else if (hasA) { label = '자산 합계'; color = '#2E7D6B'; }
      else { label = '부채 합계'; color = '#B05A4F'; data = data.map((v) => -v); }
      datasets = [{ label, data, borderColor: color, backgroundColor: color + '22', fill: true, tension: .25, pointRadius: single ? 6 : 3, pointBackgroundColor: color, borderWidth: 2 }];
    } else {
      let ai = 0, li = 0;
      datasets = ids.map((id) => {
        const it = getItemById(id);
        const color = it.kind === 'asset' ? ASSET_PALETTE[ai++ % ASSET_PALETTE.length] : LOAN_PALETTE[li++ % LOAN_PALETTE.length];
        return {
          label: (it.kind === 'loan' ? '🔻 ' : '') + it.obj.name,
          data: dates.map((t) => valueAtDate(it.obj.records, it.field, t)),
          borderColor: color, backgroundColor: color + '15', fill: false, tension: .25,
          pointRadius: single ? 6 : 2, borderWidth: 2, borderDash: it.kind === 'loan' ? [5, 3] : []
        };
      });
    }

    const th = chartTheme();
    customChart = new Chart(ctx, {
      type: 'line',
      data: { labels: dates, datasets },
      options: {
        responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { font: { family: 'Pretendard', size: 12 }, color: th.tick, padding: 12, usePointStyle: true, boxWidth: 8 } },
          tooltip: { callbacks: { label: (c) => ` ${c.dataset.label}: ${fmtWon(c.parsed.y)}` } }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: th.tick, maxRotation: 0, autoSkip: true, maxTicksLimit: 6 } },
          y: { grid: { color: th.grid }, ticks: { font: { family: 'JetBrains Mono', size: 10 }, color: th.tick, callback: (v) => fmtShort(v) } }
        }
      }
    });
  }

  // 모드 버튼
  document.getElementById('modeIndividual').addEventListener('click', () => { customMode = 'individual'; renderCustom(); });
  document.getElementById('modeSum').addEventListener('click', () => { customMode = 'sum'; renderCustom(); });

  let listSearch = '';
  let listSort = 'default';
  const collapsed = new Set();

  function matchSearch(it) {
    return !listSearch || it.name.toLowerCase().includes(listSearch.toLowerCase());
  }
  function sortItems(items, kind) {
    const cur = (it) => { const r = latest(it.records); return r ? (Number(kind === 'asset' ? r.amount : r.balance) || 0) : 0; };
    const rec = (it) => { const r = latest(it.records); return r ? r.date : ''; };
    const arr = items.slice();
    if (listSort === 'amount_desc') arr.sort((a, b) => cur(b) - cur(a));
    else if (listSort === 'amount_asc') arr.sort((a, b) => cur(a) - cur(b));
    else if (listSort === 'name') arr.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
    else if (listSort === 'recent') arr.sort((a, b) => rec(b) < rec(a) ? -1 : 1);
    return arr;
  }
  function groupTitle(key, pillCls, pill, label, count) {
    const div = document.createElement('div');
    const isCol = collapsed.has(key);
    div.className = 'group-title' + (isCol ? ' collapsed' : '');
    div.innerHTML = `<span class="pill ${pillCls}">${pill}</span> ${label} <span style="color:var(--muted);font-weight:600">${count}</span><span class="chev">▾</span>`;
    div.addEventListener('click', () => { if (isCol) collapsed.delete(key); else collapsed.add(key); renderList(); });
    return div;
  }

  function renderList() {
    const area = document.getElementById('listArea');
    area.innerHTML = '';
    let shown = 0;

    CAT_ORDER.forEach((cat) => {
      const items = sortItems(state.assets.filter((a) => a.category === cat && matchSearch(a)), 'asset');
      if (!items.length) return;
      shown += items.length;
      area.appendChild(groupTitle('a:' + cat, 'asset', '자산', CAT_LABEL[cat], items.length));
      if (!collapsed.has('a:' + cat)) items.forEach((a) => area.appendChild(assetRow(a)));
    });

    const loans = sortItems(state.loans.filter((l) => matchSearch(l)), 'loan');
    if (loans.length) {
      shown += loans.length;
      area.appendChild(groupTitle('loans', 'loan', '대출', '부채', loans.length));
      if (!collapsed.has('loans')) loans.forEach((l) => area.appendChild(loanRow(l)));
    }

    if (!state.assets.length && !state.loans.length) {
      area.innerHTML = '<div class="empty">아직 항목이 없습니다.<br>위의 [+ 자산 추가] / [+ 대출 추가]로 시작하세요.</div>';
    } else if (!shown) {
      area.innerHTML = `<div class="empty">'${escapeHtml(listSearch)}'에 해당하는 항목이 없습니다.</div>`;
    }
  }

    return `<span class="chg num ${cls}">${fmtSigned(delta)}</span>`;

  /* ---------- 시계열 표 (자산/대출 공용) ---------- */
  // field: 'amount'(자산) | 'balance'(대출)
  function timeseriesTable(records, field) {
    const sorted = (records || []).slice().sort((a, b) => a.date < b.date ? 1 : -1);
    const rows = sorted.map((rec, i) => `
      <tr data-i="${i}">
        <td class="colw-date"><input type="date" value="${rec.date}" data-k="date"></td>
        <td><input class="num" inputmode="numeric" value="${(Number(rec[field]) || 0).toLocaleString('ko-KR')}" data-k="${field}"></td>
        <td><input value="${escapeHtml(rec.note || '')}" data-k="note" placeholder="메모"></td>
        <td class="colw-act"><button class="del" data-del="${i}" title="삭제">🗑</button></td>
      </tr>`).join('');
    return `
      <table class="ts">
        <thead><tr><th>날짜</th><th style="text-align:right">${field === 'balance' ? '잔액' : '금액'}</th><th>메모</th><th></th></tr></thead>
        <tbody id="tsBody">
          ${rows || ''}
          <tr class="addrow">
            <td class="colw-date"><input type="date" id="newDate" value="${todayISO()}"></td>
            <td><input class="num" id="newAmt" inputmode="numeric" placeholder="0"></td>
            <td><input id="newNote" placeholder="새 기록 메모"></td>
            <td class="colw-act"><button class="del" id="tsAdd" title="추가" style="color:var(--asset)">＋</button></td>
          </tr>
        </tbody>
      </table>`;
  }

  // 시계열 표의 편집/추가/삭제 이벤트 바인딩
  function bindTimeseries(records, field, onChange) {
    const body = document.getElementById('tsBody');
    if (!body) return;
    const sorted = () => (records.slice().sort((a, b) => a.date < b.date ? 1 : -1));

    // 인라인 편집
    body.querySelectorAll('tr[data-i] input').forEach((inp) => {
      inp.addEventListener('change', () => {
        const tr = inp.closest('tr');
        const i = Number(tr.dataset.i);
        const rec = sorted()[i];
        if (!rec) return;
        const k = inp.dataset.k;
        if (k === 'date') {
          if (!validDate(inp.value)) { toast('날짜 형식이 올바르지 않습니다'); inp.value = rec.date; return; }
          // 같은 날짜 충돌 → 덮어쓰기 확인
          const clash = records.find((r) => r !== rec && r.date === inp.value);
          if (clash) {
            if (!confirm(`${inp.value} 기록이 이미 있습니다. 덮어쓸까요?`)) { inp.value = rec.date; return; }
            records.splice(records.indexOf(clash), 1);
          }
          rec.date = inp.value;
        } else if (k === 'note') {
          rec.note = inp.value;
        } else {
          rec[field] = parseAmount(inp.value);
        }
        onChange();
      });
    });

    // 행 삭제
    body.querySelectorAll('button[data-del]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const i = Number(btn.dataset.del);
        const rec = sorted()[i];
        if (!rec) return;
        if (records.length <= 1) { if (!confirm('마지막 기록입니다. 삭제할까요?')) return; }
        records.splice(records.indexOf(rec), 1);
        onChange();
      });
    });

    // 새 행 추가
    const addBtn = document.getElementById('tsAdd');
    if (addBtn) addBtn.addEventListener('click', () => {
      const date = document.getElementById('newDate').value;
      const amt = parseAmount(document.getElementById('newAmt').value);
      const note = document.getElementById('newNote').value;
      if (!validDate(date)) { toast('날짜를 확인하세요'); return; }
      const clash = records.find((r) => r.date === date);
      if (clash) {
        if (!confirm(`${date} 기록이 이미 있습니다. 덮어쓸까요?`)) return;
        clash[field] = amt; clash.note = note;
      } else {
        records.push({ date, [field]: amt, note });
      }
      onChange();
    });
  }

  /* ---------- 자산 상세 ---------- */

    const a = state.assets.find((x) => x.id === id);
    if (!a) return;
    const r = latest(a.records);
    const g = assetGain(a);
    const gainHtml = g ? `
      <div class="ical" style="margin-bottom:14px">
        <div class="line"><span class="k">매입가/원금</span><span class="v num">${fmtWon(g.principal)}</span></div>
        <div class="line"><span class="k">현재 평가액</span><span class="v num">${fmtWon(g.cur)}</span></div>
        <div class="line total"><span class="k">평가손익</span><span class="v num ${g.gain > 0 ? 'up' : g.gain < 0 ? 'down' : ''}">${fmtSigned(g.gain)} (${fmtPct(g.pct)})</span></div>
      </div>` : '';
    const html = `
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div><div style="font-size:12px;color:var(--muted)">${escapeHtml(a.subType || '')} · ${CAT_LABEL[a.category]}</div>
          <div style="font-size:24px;font-weight:800" class="num">${fmtWon(r ? r.amount : 0)}</div></div>
          <button class="mini-btn" id="aEdit">기본정보 수정</button>
        </div>
      </div>

      <div class="section-label">날짜별 금액 기록</div>
      ${timeseriesTable(a.records, 'amount')}
      <p style="font-size:12px;color:var(--muted);margin-top:10px">셀을 눌러 바로 수정하고, 맨 아래 입력행으로 새 기록을 추가하세요. 금액은 "8억5천만"처럼 한글 단위로도 입력됩니다.</p>
    `;
    openSheet(a.name, html);
    document.getElementById('aEdit').addEventListener('click', () => openAssetForm(id));
    attachAmountInput(document.getElementById('newAmt'));
    bindTimeseries(a.records, 'amount', () => { save(); openAssetDetail(id); renderAll(); });
  }

  /* ---------- 대출 상세 (이자 계산 포함) ---------- */
  function openLoanDetail(id) {
    const l = state.loans.find((x) => x.id === id);
    if (!l) return;
    const ic = loanInterest(l);
    const rate = latestRate(l.rateHistory);
    const rateRows = (l.rateHistory || []).slice().sort((a, b) => a.date < b.date ? 1 : -1)
      .map((h, i) => `<tr data-ri="${i}">
        <td class="colw-date"><input type="date" value="${h.date}" data-rk="date"></td>
        <td><input class="num" inputmode="decimal" value="${h.rate}" data-rk="rate"> %</td>
        <td class="colw-act"><button class="del" data-rdel="${i}">🗑</button></td></tr>`).join('');

    const interestDetail = (() => {
      if (ic.P <= 0) return '<div class="warn">현재 잔액이 0원입니다.</div>';
      const npd = nextPaymentDate(l);
      let lines = `<div class="line"><span class="k">현재 잔액</span><span class="v num">${fmtWon(ic.P)}</span></div>
        <div class="line"><span class="k">적용 금리(연)</span><span class="v num">${ic.annual.toFixed(2)}%</span></div>
        <div class="line"><span class="k">잔여 기간</span><span class="v num">${ic.n}개월</span></div>
        ${npd ? `<div class="line"><span class="k">다음 상환 예정일</span><span class="v num">${npd}</span></div>` : ''}
        <div class="line total"><span class="k">이번 달 이자</span><span class="v num down">${fmtWon(ic.monthInterest)}</span></div>`;
      if (l.repaymentType === 'bullet') {
        lines += `<div class="line"><span class="k">월 납입(이자만)</span><span class="v num">${fmtWon(ic.monthlyPayment)}</span></div>
          <div class="line"><span class="k">원금</span><span class="v num">만기 일시상환</span></div>`;
      } else {
        lines += `<div class="line"><span class="k">월 납입금</span><span class="v num">${fmtWon(ic.monthlyPayment)}</span></div>
          <div class="line"><span class="k">└ 원금분</span><span class="v num">${fmtWon(ic.principalPart)}</span></div>
          <div class="line"><span class="k">└ 이자분</span><span class="v num">${fmtWon(ic.interestPart)}</span></div>`;
      }
      lines += `<div class="line total"><span class="k">잔여 만기까지 총 예상 이자</span><span class="v num down">${fmtWon(ic.totalInterest)}</span></div>`;
      if (ic.expired) lines += '<div class="warn">⚠ 만기가 경과했습니다. 잔여기간 기준 계산이 제한됩니다.</div>';
      else if (ic.n === 0) lines += '<div class="warn">⚠ 잔여 개월이 0입니다(이번 달 만기).</div>';
      return lines;
    })();

    const html = `
      <div class="card" style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div><div style="font-size:12px;color:var(--muted)">${escapeHtml(l.lender || '')} · ${RATE_LABEL[l.rateType]} · ${REPAY_LABEL[l.repaymentType]}</div>
          <div style="font-size:24px;font-weight:800;color:var(--loan)" class="num">${fmtWon(ic.P)}</div>
          <div style="font-size:12px;color:var(--muted)">만기 ${l.maturityDate || '—'}</div></div>
          <button class="mini-btn" id="lEdit">기본정보 수정</button>
        </div>
      </div>

      <div class="section-label">이자 자동 계산</div>
      <div class="ical">${interestDetail}</div>

      <div class="section-label">금리 이력 ${l.rateType === 'variable' ? '(변동금리)' : ''}</div>
      <table class="ts">
        <thead><tr><th>적용일</th><th>연이율</th><th></th></tr></thead>
        <tbody id="rateBody">
          ${rateRows}
          <tr class="addrow">
            <td class="colw-date"><input type="date" id="newRateDate" value="${todayISO()}"></td>
            <td><input class="num" id="newRate" inputmode="decimal" placeholder="3.50"> %</td>
            <td class="colw-act"><button class="del" id="rateAdd" style="color:var(--asset)">＋</button></td>
          </tr>
        </tbody>
      </table>

      <div class="section-label">날짜별 잔액 기록</div>
      ${timeseriesTable(l.records, 'balance')}
    `;
    openSheet(l.name, html);
    document.getElementById('lEdit').addEventListener('click', () => openLoanForm(id));
    attachAmountInput(document.getElementById('newAmt'));
    bindTimeseries(l.records, 'balance', () => { save(); openLoanDetail(id); renderAll(); });
    bindRateHistory(l, id);
  }

  function bindRateHistory(l, id) {
    const body = document.getElementById('rateBody');
    if (!body) return;
    const sorted = () => l.rateHistory.slice().sort((a, b) => a.date < b.date ? 1 : -1);
    body.querySelectorAll('tr[data-ri] input').forEach((inp) => {
      inp.addEventListener('change', () => {
        const i = Number(inp.closest('tr').dataset.ri);
        const h = sorted()[i]; if (!h) return;
        if (inp.dataset.rk === 'date') {
          if (!validDate(inp.value)) { toast('날짜 확인'); inp.value = h.date; return; }
          h.date = inp.value;
        } else {
          const v = parseFloat(String(inp.value).replace(/[,\s%]/g, ''));
          h.rate = isFinite(v) && v >= 0 ? v : 0;
        }
        save(); openLoanDetail(id); renderAll();
      });
    });
    body.querySelectorAll('button[data-rdel]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const i = Number(btn.dataset.rdel); const h = sorted()[i]; if (!h) return;
        if (l.rateHistory.length <= 1) { toast('금리 이력은 최소 1건 필요합니다'); return; }
        l.rateHistory.splice(l.rateHistory.indexOf(h), 1);
        save(); openLoanDetail(id); renderAll();
      });
    });
    const add = document.getElementById('rateAdd');
    if (add) add.addEventListener('click', () => {
      const date = document.getElementById('newRateDate').value;
      const v = parseFloat(String(document.getElementById('newRate').value).replace(/[,\s%]/g, ''));
      if (!validDate(date)) { toast('날짜 확인'); return; }
      if (!isFinite(v) || v < 0) { toast('금리를 확인하세요'); return; }
      const clash = l.rateHistory.find((h) => h.date === date);
      if (clash) { if (!confirm(`${date} 금리가 이미 있습니다. 덮어쓸까요?`)) return; clash.rate = v; }
      else l.rateHistory.push({ date, rate: v });
      save(); openLoanDetail(id); renderAll();
    });
  }

  /* ---------- 자산 추가/수정 폼 ---------- */
  function openAssetForm(id) {
    const a = id ? state.assets.find((x) => x.id === id) : null;
    const isNew = !a;
    const html = `
      <div class="field"><label>이름</label><input id="fName" value="${a ? escapeHtml(a.name) : ''}" placeholder="예: 래미안 아파트"></div>
      <div class="frow">
        <div class="field"><label>분류</label><select id="fCat">
          ${CAT_ORDER.map((c) => `<option value="${c}" ${a && a.category === c ? 'selected' : ''}>${CAT_LABEL[c]}</option>`).join('')}
        </select></div>
        <div class="field"><label>세부유형</label><input id="fSub" value="${a ? escapeHtml(a.subType || '') : ''}" placeholder="아파트/주식/예금 등"></div>
      </div>
      <div class="field num"><label>매입가 / 원금 (선택 · 수익률 계산용)</label><input id="fPrincipal" inputmode="numeric" value="${a && a.principal ? Number(a.principal).toLocaleString('ko-KR') : ''}" placeholder="비워두면 수익률 표시 안 함"></div>
      ${isNew ? `<div class="frow">
        <div class="field"><label>최초 기록일</label><input type="date" id="fDate" value="${todayISO()}"></div>
        <div class="field num"><label>현재 금액(원)</label><input id="fAmt" inputmode="numeric" placeholder="예: 8억5천만"></div>
      </div>` : ''}
      <button class="btn-primary" id="fSave">${isNew ? '자산 추가' : '저장'}</button>
      ${isNew ? '' : '<button class="btn-ghost" id="fDel">이 자산 삭제</button>'}
    `;
    openSheet(isNew ? '자산 추가' : '자산 수정', html);
    attachAmountInput(document.getElementById('fAmt'));
    attachAmountInput(document.getElementById('fPrincipal'));
    document.getElementById('fSave').addEventListener('click', () => {
      const name = document.getElementById('fName').value.trim();
      if (!name) { toast('이름을 입력하세요'); return; }
      const cat = document.getElementById('fCat').value;
      const sub = document.getElementById('fSub').value.trim();
      const pr = parseAmount(document.getElementById('fPrincipal').value);
      if (isNew) {
        const date = document.getElementById('fDate').value;
        if (!validDate(date)) { toast('날짜를 확인하세요'); return; }
        const amt = parseAmount(document.getElementById('fAmt').value);
        const nid = uuid();
        state.assets.push({ id: nid, name, category: cat, subType: sub, principal: pr > 0 ? pr : null, records: [{ date, amount: amt, note: '' }] });
        customSel.add(nid); saveView();
      } else {
        a.name = name; a.category = cat; a.subType = sub; a.principal = pr > 0 ? pr : null;
      }
      save(); renderAll(); closeSheet(); toast(isNew ? '자산이 추가되었습니다' : '저장되었습니다');
    });
    if (!isNew) document.getElementById('fDel').addEventListener('click', () => deleteAsset(id));
  }

  /* ---------- 대출 추가/수정 폼 ---------- */
  function openLoanForm(id) {
    const l = id ? state.loans.find((x) => x.id === id) : null;
    const isNew = !l;
    const html = `
      <div class="field"><label>이름</label><input id="fName" value="${l ? escapeHtml(l.name) : ''}" placeholder="예: 주택담보대출"></div>
      <div class="field"><label>대출기관</label><input id="fLender" value="${l ? escapeHtml(l.lender || '') : ''}" placeholder="예: 국민은행"></div>
      <div class="frow">
        <div class="field"><label>금리유형</label><select id="fRateType">
          <option value="fixed" ${l && l.rateType === 'fixed' ? 'selected' : ''}>고정금리</option>
          <option value="variable" ${l && l.rateType === 'variable' ? 'selected' : ''}>변동금리</option>
        </select></div>
        <div class="field"><label>상환방식</label><select id="fRepay">
          <option value="bullet" ${l && l.repaymentType === 'bullet' ? 'selected' : ''}>만기일시상환</option>
          <option value="equal_payment" ${l && l.repaymentType === 'equal_payment' ? 'selected' : ''}>원리금균등</option>
          <option value="equal_principal" ${l && l.repaymentType === 'equal_principal' ? 'selected' : ''}>원금균등</option>
        </select></div>
      </div>
      <div class="frow">
        <div class="field"><label>개시일</label><input type="date" id="fStart" value="${l ? l.startDate : todayISO()}"></div>
        <div class="field"><label>만기일</label><input type="date" id="fMaturity" value="${l ? l.maturityDate : ''}"></div>
      </div>
      ${isNew ? `<div class="frow">
        <div class="field num"><label>현재 잔액(원)</label><input id="fBal" inputmode="numeric" placeholder="0"></div>
        <div class="field num"><label>연이율(%)</label><input id="fRate" inputmode="decimal" placeholder="3.50"></div>
      </div>` : ''}
      <button class="btn-primary" id="fSave">${isNew ? '대출 추가' : '저장'}</button>
      ${isNew ? '' : '<button class="btn-ghost" id="fDel">이 대출 삭제</button>'}
    `;
    openSheet(isNew ? '대출 추가' : '대출 수정', html);
    attachAmountInput(document.getElementById('fBal'));
    document.getElementById('fSave').addEventListener('click', () => {
      const name = document.getElementById('fName').value.trim();
      if (!name) { toast('이름을 입력하세요'); return; }
      const lender = document.getElementById('fLender').value.trim();
      const rateType = document.getElementById('fRateType').value;
      const repay = document.getElementById('fRepay').value;
      const start = document.getElementById('fStart').value;
      const maturity = document.getElementById('fMaturity').value;
      if (!validDate(start) || !validDate(maturity)) { toast('개시일·만기일을 확인하세요'); return; }
      if (maturity <= start) { toast('만기일은 개시일 이후여야 합니다'); return; }
      if (isNew) {
        const bal = parseAmount(document.getElementById('fBal').value);
        const rate = parseFloat(String(document.getElementById('fRate').value).replace(/[,\s%]/g, '')) || 0;
        const nid = uuid();
        state.loans.push({
          id: nid, name, lender, rateType, repaymentType: repay,
          startDate: start, maturityDate: maturity,
          rateHistory: [{ date: start, rate: Math.max(0, rate) }],
          records: [{ date: todayISO(), balance: bal, note: '' }]
        });
        customSel.add(nid); saveView();
      } else {
        l.name = name; l.lender = lender; l.rateType = rateType; l.repaymentType = repay;
        l.startDate = start; l.maturityDate = maturity;
      }
      save(); renderAll(); closeSheet(); toast(isNew ? '대출이 추가되었습니다' : '저장되었습니다');
    });
    if (!isNew) document.getElementById('fDel').addEventListener('click', () => deleteLoan(id));
  }

  /* ---------- 삭제 ---------- */
  function deleteAsset(id) {
    const a = state.assets.find((x) => x.id === id);
    if (!a) return;
    if (!confirm(`'${a.name}' 자산과 모든 기록을 삭제할까요?`)) return;
    snapshot();
    state.assets = state.assets.filter((x) => x.id !== id);
    save(); renderAll(); closeSheet(); toast('삭제되었습니다', '실행취소', doUndo);
  }
  function deleteLoan(id) {
    const l = state.loans.find((x) => x.id === id);
    if (!l) return;
    if (!confirm(`'${l.name}' 대출과 모든 기록을 삭제할까요?`)) return;
    snapshot();
    state.loans = state.loans.filter((x) => x.id !== id);
    save(); renderAll(); closeSheet(); toast('삭제되었습니다', '실행취소', doUndo);
  }

  /* ============================================================
     데이터 관리 (내보내기/가져오기/초기화)
     ============================================================ */
  function exportJSON() {
    download(JSON.stringify(state, null, 2), `자산관리-${todayISO()}.json`, 'application/json');
    try { localStorage.setItem(BACKUP_KEY, new Date().toISOString()); } catch (e) {}
    renderBackupBadge();
    toast('JSON으로 백업했습니다');
  }
  function exportCSV() {
    const rows = [['유형', '이름', '분류/기관', '상환방식', '날짜', '금액/잔액', '메모']];
    state.assets.forEach((a) => (a.records || []).slice().sort((x, y) => x.date < y.date ? -1 : 1)
      .forEach((r) => rows.push(['자산', a.name, CAT_LABEL[a.category] + (a.subType ? '/' + a.subType : ''), '', r.date, Math.round(Number(r.amount) || 0), r.note || ''])));
    state.loans.forEach((l) => (l.records || []).slice().sort((x, y) => x.date < y.date ? -1 : 1)
      .forEach((r) => rows.push(['대출', l.name, l.lender || '', REPAY_LABEL[l.repaymentType], r.date, Math.round(Number(r.balance) || 0), r.note || ''])));
    const csv = '﻿' + rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\r\n');
    download(csv, `자산관리-${todayISO()}.csv`, 'text/csv;charset=utf-8');
    toast('CSV로 내보냈습니다 (엑셀에서 열기)');
  }
  function triggerImport() { document.getElementById('importFile').click(); }
  document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || typeof data !== 'object' || !Array.isArray(data.assets)) throw new Error('형식 오류');
        const clean = sanitizeData(data);
        if (!confirm(`현재 데이터를 가져온 파일로 교체할까요?\n(자산 ${clean.assets.length}건, 대출 ${clean.loans.length}건)`)) { e.target.value = ''; return; }
        snapshot();
        state = clean;
        save(); renderAll(); toast('가져오기 완료', '실행취소', doUndo);
      } catch (err) { toast('가져오기 실패: 올바른 JSON이 아닙니다'); }
      e.target.value = '';
    };
    reader.readAsText(file);
  });
  function resetAll() {
    if (!confirm('모든 데이터를 삭제하고 초기화할까요?')) return;
    if (!confirm('정말 전체 초기화하시겠습니까? (실행취소로 한 번은 되돌릴 수 있습니다)')) return;
    snapshot();
    state = { assets: [], loans: [] };
    save(); renderAll(); closeSheet(); toast('초기화되었습니다', '실행취소', doUndo);
  }

  function renderBackupBadge() {
    const el = document.getElementById('backupBadge');
    if (!el) return;
    let iso = null;
    try { iso = localStorage.getItem(BACKUP_KEY); } catch (e) {}
    if (!iso) { el.innerHTML = '<span class="stale">⚠ 아직 백업한 적이 없습니다.</span> 정기적으로 내보내기를 권장합니다.'; return; }
    const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
    const when = iso.slice(0, 10);
    if (days >= 14) el.innerHTML = `<span class="stale">⚠ 마지막 백업: ${when} (${days}일 전)</span> — 내보내기를 권장합니다.`;
    else el.innerHTML = `<span class="ok">✓ 마지막 백업: ${when}</span> (${days <= 0 ? '오늘' : days + '일 전'})`;
  }

  // 헤더 + 데이터 카드 버튼 (동일 동작)
  document.getElementById('exportBtn').addEventListener('click', exportJSON);
  document.getElementById('exportBtn2').addEventListener('click', exportJSON);
  document.getElementById('csvBtn').addEventListener('click', exportCSV);
  document.getElementById('importBtn').addEventListener('click', triggerImport);
  document.getElementById('importBtn2').addEventListener('click', triggerImport);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
  document.getElementById('resetBtn2').addEventListener('click', resetAll);

  document.getElementById('addAssetBtn').addEventListener('click', () => openAssetForm(null));
  document.getElementById('addLoanBtn').addEventListener('click', () => openLoanForm(null));

  // 테마 토글
  document.getElementById('themeBtn').addEventListener('click', () => {
    const dark = document.documentElement.dataset.theme === 'dark';
    applyTheme(dark ? 'light' : 'dark');
    renderAll(); // 차트 색 갱신

  // 기간 필터

    chartPeriod = p;

  // 검색 / 정렬
  document.getElementById('searchInput').addEventListener('input', (e) => { listSearch = e.target.value.trim(); renderList(); });
  document.getElementById('sortSelect').addEventListener('change', (e) => { listSort = e.target.value; renderList(); });

  /* ---------- 토스트 ---------- */
  let toastTimer = null;
  function toast(msg, actionLabel, actionFn, sticky) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    const btn = document.getElementById('toastAction');
    if (actionLabel) {
      btn.textContent = actionLabel; btn.classList.remove('hidden');
      btn.onclick = () => { t.classList.remove('show'); if (actionFn) actionFn(); };
    } else btn.classList.add('hidden');
    t.classList.add('show');
    clearTimeout(toastTimer);
    if (!sticky) toastTimer = setTimeout(() => t.classList.remove('show'), actionLabel ? 6000 : 2400);
  }

  /* ============================================================
     PWA: 설치 / 서비스워커
     ============================================================ */
  // beforeinstallprompt 가로채 "앱 설치" 버튼 노출 (안드로이드 Chrome)
  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');
  const isStandalone = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    if (!isStandalone()) installBtn.classList.remove('hidden');
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.classList.add('hidden');
    if (outcome === 'accepted') toast('앱이 설치되었습니다');
  });
  window.addEventListener('appinstalled', () => { installBtn.classList.add('hidden'); toast('홈 화면에 추가되었습니다'); });
  if (isStandalone()) installBtn.classList.add('hidden');

  // 서비스워커 등록 + 새 버전 감지
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then((reg) => {
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              toast('새 버전이 있습니다', '새로고침', () => { nw.postMessage('SKIP_WAITING'); location.reload(); }, true);
            }
          });
        });
      }).catch((err) => console.warn('SW 등록 실패', err));
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return; refreshing = true; location.reload();
      });
    });
  }

  /* ============================================================
     초기화
     ============================================================ */
  initTheme();              // 테마 (저장값 또는 시스템 설정)
  if (!load()) seed();      // 최초 실행 시 샘플 데이터
  if (!loadView()) {        // 커스텀 그래프 기본값: 전체 자산 개별 비교
    customSel = new Set(state.assets.map((a) => a.id));
    customMode = 'individual';
  }
  try { goalAmount = Number(localStorage.getItem(GOAL_KEY)) || 0; } catch (e) {}
  try { const p = localStorage.getItem(PERIOD_KEY); if (['3m', '6m', '12m', 'all'].includes(p)) chartPeriod = p; } catch (e) {}
  renderAll();
  renderBackupBadge();
  </script>
</body>
</html>
